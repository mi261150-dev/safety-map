<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>福大・安全ナビマップ（試作）</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        
        .ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            z-index: 1000;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .dest-info { color: #1a73e8; font-weight: bold; font-size: 16px; margin-bottom: 8px; }
        .instruction { font-size: 11px; color: #666; }
        .btn-group { display: flex; gap: 8px; overflow-x: auto; margin-top: 10px; }
        .btn-spot {
            white-space: nowrap;
            background: #1a73e8;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="ui-panel">
        <div class="dest-info" id="dest-label">📍 地図をタップして目的地を選択</div>
        <div class="instruction">福大周辺の事故多発エリアを避け、安全な道を選びましょう。</div>
        <div class="btn-group">
            <button class="btn-spot" onclick="setDestination([36.0768, 136.2125], '福井大学 正門')">🎓福大正門</button>
            <button class="btn-spot" onclick="setDestination([36.0795, 136.2115], '福大前西福井駅')">🚃西福井駅</button>
            <button class="btn-spot" onclick="setDestination([36.0715, 136.2165], '福井県立美術館')">🎨美術館</button>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 福井大学 文京キャンパスを中心に設定
        const map = L.map('map').setView([36.0768, 136.2125], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let userLocation = [36.0768, 136.2125];
        let routeLine = L.polyline([], {color: '#1a73e8', weight: 8, opacity: 0.6, dashArray: '1, 15'}).addTo(map);
        let destMarker;

        // 2. GPS現在地
        map.locate({setView: false, watch: true});
        map.on('locationfound', (e) => {
            userLocation = e.latlng;
            updateRoute();
        });

        // 3. 地図タップで目的地セット
        map.on('click', function(e) {
            setDestination(e.latlng, "指定地点");
        });

        function setDestination(latlng, name) {
            document.getElementById('dest-label').innerText = "目的地: " + name;
            if (destMarker) map.removeLayer(destMarker);
            destMarker = L.marker(latlng).addTo(map).bindPopup(name).openPopup();
            updateRoute();
            map.fitBounds(L.latLngBounds([userLocation, latlng]), {padding: [50, 50]});
        }

        function updateRoute() {
            if (destMarker) {
                routeLine.setLatLngs([userLocation, destMarker.getLatLng()]);
            }
        }

        // 4. 福大周辺のダミー事故データ（サンプル）
        const accidents = [
            {pos: [36.0782, 136.2110], type: "西福井駅前交差点", sev: "重傷", comm: "踏切と交差点が近く複雑です"},
            {pos: [36.0755, 136.2135], type: "大学南側路地", sev: "軽傷", comm: "学生の飛び出しに注意"},
            {pos: [36.0740, 136.2170], type: "フェニックス通り合流", sev: "重傷", comm: "交通量が非常に多いです"},
            {pos: [36.0790, 136.2160], type: "北側交差点", sev: "軽傷", comm: "右左折時の巻き込みに注意"},
            {pos: [36.0725, 136.2115], type: "明新小学校付近", sev: "軽傷", comm: "通学路につき徐行"}
        ];

        accidents.forEach(acc => {
            const color = acc.sev === '重傷' ? 'red' : 'orange';
            L.circleMarker(acc.pos, {radius: 10, fillColor: color, color: 'black', weight: 1, fillOpacity: 0.8}).addTo(map);
            L.circle(acc.pos, {radius: 60, color: 'red', weight: 0, fillColor: 'red', fillOpacity: 0.2}).addTo(map);
        });
    </script>
</body>
</html>
