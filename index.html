<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>福大・道なり安全ナビ</title>
    <!-- 1. Leaflet本体 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- 2. ルーティング用のCSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; overflow: hidden; }
        .ui-panel {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9); padding: 15px; z-index: 1000;
            text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #dest-label { font-weight: bold; color: #1a73e8; font-size: 16px; }
        /* ルーティングの指示パネル（テキスト）を隠して地図を広く使う */
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>
    <div class="ui-panel">
        <div id="dest-label">地図をタップして「道なり」案内を開始</div>
    </div>
    <div id="map"></div>

    <!-- 3. Leaflet本体のJS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 4. ルーティング用のJS（これが道を計算します） -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([36.0768, 136.2125], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let userLocation = [36.0768, 136.2125];
        let routingControl = null;

        // GPS現在地
        map.locate({setView: false, watch: true});
        map.on('locationfound', (e) => {
            userLocation = e.latlng;
            L.circleMarker(e.latlng, {radius: 8, fillColor: '#1a73e8', color: 'white', weight: 3, fillOpacity: 1}).addTo(map);
        });

        // 【修正ポイント】目的地をセットした時にRoutingエンジンを呼び出す
        map.on('click', (e) => setDestination(e.latlng, "目的地"));

        function setDestination(latlng, name) {
            document.getElementById('dest-label').innerText = "目的地まで「道なり」に案内中";

            // 古いルートを消す
            if (routingControl) {
                map.removeControl(routingControl);
            }

            // 直線ではなく、OSMの道路データを使ってルートを引く
            routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(userLocation),
                    L.latLng(latlng)
                ],
                lineOptions: {
                    styles: [{ color: '#007AFF', weight: 8, opacity: 0.8 }]
                },
                addWaypoints: false,
                draggableWaypoints: false,
                createMarker: function() { return null; } // 余計なマーカーを表示しない
            }).addTo(map);
        }

        // 事故データの読み込み
        fetch('data.json').then(res => res.json()).then(data => {
            data.forEach(acc => {
                const color = acc.severity === '重傷' ? 'red' : 'orange';
                L.circleMarker([acc.lat, acc.lng], {radius: 10, fillColor: color, color: 'white', weight: 2, fillOpacity: 0.8}).addTo(map);
                L.circle([acc.lat, acc.lng], {radius: 60, color: 'red', weight: 0, fillColor: 'red', fillOpacity: 0.15}).addTo(map);
            });
        });
    </script>
</body>
</html>
