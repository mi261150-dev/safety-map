<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>鯖江・安全周遊マップ（現在地対応）</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: sans-serif; }
        .info-panel {
            position: absolute;
            top: 10px;
            left: 50px; /* ボタンと被らないように調整 */
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            z-index: 1000;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="info-panel">
        <b>鯖江 安全周遊マップ</b><br>
        <small>🔵 あなたの現在地</small><br>
        <small>⚠️ 事故地点（赤:重傷 / 橙:軽傷）</small>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 地図の初期化（鯖江市役所中心）
        const map = L.map('map').setView([35.9445, 136.1862], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. 現在地を表示する機能
        // スマホなどのGPSを利用して位置を特定します
        map.locate({setView: false, watch: true, maxZoom: 16});

        // 現在地が見つかった時の処理
        const userIcon = L.circleMarker([0, 0], {
            radius: 8,
            fillColor: '#2A82F4',
            color: 'white',
            weight: 3,
            opacity: 1,
            fillOpacity: 1
        }).addTo(map).bindPopup("あなたはここにいます");

        map.on('locationfound', function(e) {
            userIcon.setLatLng(e.latlng);
        });

        map.on('locationerror', function(e) {
            console.alert("位置情報が取得できませんでした。設定を確認してください。");
        });

        // 3. 西山公園周辺の「安全おすすめルート」
        const safeRoute = [[35.9431, 136.1835], [35.9452, 136.1825], [35.9485, 136.1815], [35.9495, 136.1790]];
        L.polyline(safeRoute, {color: 'blue', weight: 6, opacity: 0.4}).addTo(map);

        // 4. 鯖江の事故データ（data.json）の読み込み
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                data.forEach(accident => {
                    const color = accident.severity === '重傷' ? 'red' : 'orange';
                    L.circleMarker([accident.lat, accident.lng], {
                        radius: 10,
                        fillColor: color,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map)
                    .bindPopup(`<b>${accident.type}</b><br>${accident.severity}<br>${accident.comment}`);
                });
            });
    </script>
</body>
</html>
