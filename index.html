<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>鯖江・安全ナビ周遊マップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; }
        
        /* スマホ向け案内パネル */
        .nav-panel {
            position: absolute;
            bottom: 20px;
            left: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            z-index: 1000;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        .btn-nav {
            background: #007AFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 10px;
        }
        .hazard-area { color: #FF3B30; font-weight: bold; }
        .safe-route-text { color: #007AFF; font-weight: bold; }
    </style>
</head>
<body>
    <div class="nav-panel">
        <div id="nav-instruction">
            <span class="safe-route-text">✨おすすめ周遊ルートを表示中</span><br>
            <small>事故多発地点を避けて西山公園を散策しましょう</small>
        </div>
        <button class="btn-nav" onclick="focusUser()">現在地を表示</button>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([35.9445, 136.1862], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- 1. 現在地機能 ---
        let userMarker;
        map.locate({setView: false, watch: true});
        map.on('locationfound', (e) => {
            if (!userMarker) {
                userMarker = L.circleMarker(e.latlng, {radius: 8, fillColor: '#007AFF', color: 'white', weight: 3, fillOpacity: 1}).addTo(map);
            } else {
                userMarker.setLatLng(e.latlng);
            }
        });

        function focusUser() {
            if (userMarker) map.setView(userMarker.getLatLng(), 16);
        }

        // --- 2. 事故回避・周遊ルート（青い線） ---
        // 事故が多い国道8号や主要交差点を避け、裏道や公園内を通るルート
        const tourRoute = [
            [35.9431, 136.1885], // 鯖江駅
            [35.9435, 136.1855], // 商店街を通る
            [35.9450, 136.1840], // 三六温泉方面
            [35.9452, 136.1825], // 西山公園入口（ここから安全エリア）
            [35.9470, 136.1810], // 公園内スロープ
            [35.9485, 136.1815], // 結びの広場
            [35.9505, 136.1800]  // 西山動物園（ゴール！）
        ];
        L.polyline(tourRoute, {color: '#007AFF', weight: 8, opacity: 0.6, lineJoin: 'round'}).addTo(map)
         .bindPopup("<b>安全周遊ルート</b><br>事故の多い大通りを避けた散策道です");

        // --- 3. 事故多発地点の読み込みと「警告エリア」 ---
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(acc => {
                    // 事故地点を点で表示
                    const color = acc.severity === '重傷' ? 'red' : 'orange';
                    L.circleMarker([acc.lat, acc.lng], {radius: 10, fillColor: color, color: 'black', weight: 1, fillOpacity: 0.8}).addTo(map)
                     .bindPopup(`⚠️<b>危険地点</b><br>${acc.type}<br>${acc.comment}`);

                    // 事故地点の周囲をうっすら赤くして「近寄るな」を強調
                    L.circle([acc.lat, acc.lng], {radius: 50, color: 'red', weight: 0, fillColor: 'red', fillOpacity: 0.2}).addTo(map);
                });
            });
    </script>
</body>
</html>
